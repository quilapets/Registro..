<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Quilapets - Club de Amigos</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        @import url('https://googleapis.com');
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(rgba(20, 45, 20, 0.8), rgba(20, 45, 20, 0.8)), url('https://transparenttextures.com');
            background-color: #1a2e1a;
        }
        .hidden-field { display: none; }
        .brand-bg { background-color: #424242; } 
        .brand-green-text { color: #A4F13E; }
        input, select { border: 2px solid #cbd5e1 !important; border-radius: 8px !important; padding: 10px !important; }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="min-h-screen py-6 px-4">

    <div id="loader" class="loading-overlay flex-col">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
        <p class="mt-2 text-indigo-600 font-bold">Abriendo WhatsApp...</p>
    </div>

    <div class="max-w-2xl mx-auto bg-slate-50 rounded-xl shadow-2xl overflow-hidden border border-slate-300">
        <div class="brand-bg p-8 text-center">
            <h1 class="brand-green-text text-2xl md:text-3xl font-bold tracking-tight">
                Club de Amigos Quilapets 🐾
            </h1>
            <p class="text-white text-sm mt-2">Inscribe a tu compañero y recibe beneficios</p>
        </div>

        <form id="petForm" class="p-6 space-y-6">
            <!-- SECCIÓN TUTOR -->
            <section class="space-y-4">
                <h2 class="text-sm font-bold text-indigo-700 uppercase border-b-2 border-indigo-100 pb-1">1. Datos del Tutor</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Nombre del Tutor</label>
                        <input type="text" required name="nombre_tutor" placeholder="Ej: Juan Pérez" class="block w-full text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">Tu WhatsApp</label>
                        <input type="text" required name="whatsapp" placeholder="569XXXXXXXX" class="block w-full text-sm">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-700 mb-1">Sector de Despacho</label>
                        <select required name="sector" id="sectorSelect" onchange="toggleOtroSector()" class="block w-full text-sm">
                            <option value="">Seleccione su ubicación...</option>
                            <option value="Jardin del Este">Jardín del Este / Barcelona / Emmanuel</option>
                            <option value="Quilamapu">Quilamapu / Flores Millán</option>
                            <option value="Camino a Cato">Colonia Bdo. O'Higgins / Camino a Cato</option>
                            <option value="otro">Otro sector...</option>
                        </select>
                    </div>
                    <div id="divOtroSector" class="md:col-span-2 hidden-field">
                        <input type="text" id="inputOtro" name="otro_sector" placeholder="¿Cuál es tu sector?" class="block w-full text-sm bg-indigo-50">
                    </div>
                </div>
            </section>

            <!-- SECCIÓN MASCOTA -->
            <section class="space-y-4">
                <h2 class="text-sm font-bold text-indigo-700 uppercase border-b-2 border-indigo-100 pb-1">2. Información de la Mascota</h2>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="especie" value="Perro" class="hidden peer" required onchange="updateMascotaUI()">
                        <div class="p-4 border-2 rounded-xl text-center peer-checked:bg-indigo-600 peer-checked:text-white bg-white font-bold text-xs">🐶 Perro</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="especie" value="Gato" class="hidden peer" onchange="updateMascotaUI()">
                        <div class="p-4 border-2 rounded-xl text-center peer-checked:bg-indigo-600 peer-checked:text-white bg-white font-bold text-xs">🐈 Gato</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="especie" value="Otro" class="hidden peer" onchange="updateMascotaUI()">
                        <div class="p-4 border-2 rounded-xl text-center peer-checked:bg-indigo-600 peer-checked:text-white bg-white font-bold text-xs">✨ Otro</div>
                    </label>
                </div>

                <div id="divCualEspecie" class="hidden-field">
                    <label class="block text-xs font-bold text-gray-700 mb-1">¿Qué mascota es?</label>
                    <input type="text" name="cual_especie" class="block w-full text-sm bg-amber-50" placeholder="Ej: Conejo">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">Nombre de la Mascota</label>
                    <input type="text" required name="pet_nombre" placeholder="Nombre de tu amiguito" class="block w-full text-sm">
                </div>
            </section>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition-all text-lg shadow-lg">
                ¡Unirse al Club por WhatsApp! 🚀
            </button>
        </form>
    </div>

    <script>
        function toggleOtroSector() {
            const select = document.getElementById('sectorSelect');
            const div = document.getElementById('divOtroSector');
            div.style.display = select.value === 'otro' ? 'block' : 'none';
        }

        function updateMascotaUI() {
            const especie = document.querySelector('input[name="especie"]:checked').value;
            document.getElementById('divCualEspecie').style.display = especie === 'Otro' ? 'block' : 'none';
        }

        document.getElementById('petForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('loader').style.display = 'flex';

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            let sectorFinal = data.sector === 'otro' ? data.otro_sector : data.sector;
            let especieFinal = data.especie === 'Otro' ? data.cual_especie : data.especie;

            // Formateo del mensaje para WhatsApp
            let mensaje = `*¡Hola Quilapets! Quiero unirme al Club de Amigos:*%0A%0A`;
            mensaje += `👤 *Tutor:* ${data.nombre_tutor}%0A`;
            mensaje += `📞 *WhatsApp:* ${data.whatsapp}%0A`;
            mensaje += `📍 *Sector:* ${sectorFinal}%0A`;
            mensaje += `🐾 *Mascota:* ${data.pet_nombre} (${especieFinal})`;

            const tuNumero = "56994442330"; 

            setTimeout(() => {
                window.open(`https://wa.me{tuNumero}?text=${mensaje}`, '_blank');
                document.getElementById('loader').style.display = 'none';
            }, 800);
        });
    </script>
</body>
</html>
